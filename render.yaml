# Render Blueprint — single Docker service that serves BOTH the API and the
# React app at one URL. No CORS, no separate frontend host, no auth.
# In Render: New > Blueprint > connect this repo. Fill MONGO_URL when prompted.
services:
  - type: web
    name: timetablegenius
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URL
        sync: false          # paste your MongoDB Atlas connection string
      - key: DB_NAME
        value: timetable_genius
